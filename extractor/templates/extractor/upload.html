{% extends "base.html" %}

{% block content %}
<div x-data="{ 
    showSplitView: false,
    loading: false,
    editingInvoice: { id: null, supplier: '', items: [], total_ttc: 0, currency: 'EUR', preview_url: '' },
    
    openSplitView(invoice, items) {
        this.editingInvoice = { ...invoice, items: items };
        this.editingInvoice.preview_url = `/serve-pdf/${invoice.id}/`;
        this.showSplitView = true;
    },

    async save() {
        this.loading = true;
        await fetch('/update-invoice-full/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(this.editingInvoice)
        });
        window.location.reload();
    }
}" class="max-w-7xl mx-auto p-6">

    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border">
        <table class="w-full text-left">
            <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                <tr><th class="p-6">Fournisseur</th><th class="p-6 text-right">Total</th></tr>
            </thead>
            <tbody class="divide-y">
                {% for invoice in invoices %}
                <tr class="hover:bg-blue-50 cursor-pointer"
                    @click="openSplitView({
                        id: {{ invoice.id }},
                        supplier: '{{ invoice.supplier|escapejs }}',
                        total_ttc: '{{ invoice.total_ttc }}',
                        currency: '{{ invoice.currency }}'
                    }, [
                        {% for item in invoice.items.all %}
                        { description: '{{ item.description|escapejs }}', quantity: {{ item.quantity }}, price_unit: {{ item.price_unit }} },
                        {% endfor %}
                    ])">
                    <td class="p-6 font-bold">{{ invoice.supplier }}</td>
                    <td class="p-6 text-right font-black text-blue-600">{{ invoice.total_ttc }} {{ invoice.currency }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <template x-if="showSplitView">
        <div class="fixed inset-0 z-[100] flex bg-slate-900/90 backdrop-blur-sm">
            <div class="flex-1">
                <iframe :src="editingInvoice.preview_url" class="w-full h-full border-none"></iframe>
            </div>
            
            <div class="w-[500px] bg-white h-full p-8 flex flex-col">
                <div class="flex justify-between items-center mb-8">
                    <h2 class="text-xl font-bold uppercase text-blue-600 tracking-tighter">Révision Facture</h2>
                    <button @click="showSplitView = false" class="text-slate-400 text-2xl">✕</button>
                </div>

                <div class="flex-1 overflow-y-auto space-y-4">
                    <label class="text-[10px] font-black uppercase text-slate-400">Fournisseur</label>
                    <input type="text" x-model="editingInvoice.supplier" class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold mb-6">
                    
                    <h3 class="text-xs font-black uppercase text-slate-500 border-b pb-2">Articles détaillés</h3>
                    <template x-for="(item, index) in editingInvoice.items" :key="index">
                        <div class="p-4 border rounded-2xl space-y-2">
                            <input type="text" x-model="item.description" class="w-full font-bold text-sm outline-none">
                            <div class="flex gap-4">
                                <input type="number" x-model="item.quantity" class="w-16 p-2 bg-slate-50 rounded-lg text-xs">
                                <input type="number" x-model="item.price_unit" class="flex-1 p-2 bg-slate-50 rounded-lg text-xs">
                                <span class="font-bold text-blue-600 text-sm" x-text="(item.quantity * item.price_unit).toFixed(2)"></span>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="pt-8 border-t">
                    <div class="flex justify-between mb-6 font-black text-2xl uppercase italic">
                        <span>Total TTC</span>
                        <span class="text-blue-600" x-text="editingInvoice.total_ttc + ' ' + editingInvoice.currency"></span>
                    </div>
                    <button @click="save()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black uppercase shadow-xl hover:scale-105 transition-all">
                        Enregistrer les modifications
                    </button>
                </div>
            </div>
        </div>
    </template>
</div>
{% endblock %}
