<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - FactureAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">Créer un compte</h1>
            <p class="text-slate-500 mt-2">Rejoignez FactureAI pour gérer vos finances</p>
        </div>

        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                    <div class="text-xs text-slate-400 mb-1">{{ field.help_text }}</div>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}" required 
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ field.errors.as_text }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-200 transition-all mt-4">
                S'inscrire
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500">Déjà un compte ? <a href="{% url 'login' %}" class="text-blue-600 font-bold hover:underline">Connectez-vous</a></p>
        </div>
    </div>
</body>
</html>
