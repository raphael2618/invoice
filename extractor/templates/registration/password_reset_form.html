<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-slate-800">Nouveau mot de passe</h1>
            <p class="text-slate-500">Choisissez un mot de passe sécurisé.</p>
        </div>

        {% if validlink %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">{{ field.label }}</label>
                    <input type="password" name="{{ field.html_name }}" required 
                        class="w-full px-4 py-2 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                    {% if field.errors %}
                        <p class="text-red-500 text-xs mt-1">{{ field.errors.as_text }}</p>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all mt-4">
                Enregistrer le mot de passe
            </button>
        </form>
        {% else %}
        <div class="text-center py-4">
            <p class="text-red-500 font-medium">Ce lien est invalide ou a expiré.</p>
            <a href="{% url 'password_reset' %}" class="mt-4 inline-block text-blue-600 underline">Redemander un lien</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
